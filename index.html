<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kódellenőrzés</title>
  <style>
    /* Alap reset a kiszámítható méretekhez */
    *, *::before, *::after { box-sizing: border-box; }

    :root{
      /* Alap hézag; kicsi kijelzőn tovább csökkentjük */
      --gap: 8px;
      --brand: #0078ff;

      /* A doboz belső vízszintes paddingje (bal+jobb) kb. 32px */
      --container-padding-x: 32px;
    }

    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background: url('shutterstock_518160511.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .logo{
      margin-top: 24px;
      width: 150px;
      max-width: 65%;
      height: auto;
    }

    .box{
      background: rgba(255,255,255,0.92);
      padding: 18px 16px;
      margin: 24px 14px 36px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    }

    h2{
      margin: 4px 0 14px;
      font-size: 18px;
    }

    /**
     * Responsív cellaméret: az elérhető szélességet elosztjuk 6 oszloppal és 5 résekkel.
     * Számítás: (box szélesség - belső vízszintes padding - 5*gap) / 6
     * A box szélességét 100vw-hez kötjük, de legfeljebb 420px-ig.
     */
    .code-grid{
      --box-max: 420px;
      --safe-width: min(100vw, var(--box-max));
      --inner-width: calc(var(--safe-width) - var(--container-padding-x));
      --cell-size: calc((var(--inner-width) - (5 * var(--gap))) / 6);

      display: grid;
      grid-template-columns: repeat(6, minmax(34px, var(--cell-size)));
      justify-content: center;
      gap: var(--gap);
      margin: 0 auto 10px;
      width: 100%;
      max-width: var(--box-max);
    }

    /* Extra biztonsági korlát: ha még így is nagy lenne, kicsinyítjük */
    @media (max-width: 360px){
      :root{ --gap: 6px; }
    }

    /* Egy cella: felül label, alatta a négyzet input; minden fixen középen */
    .cell{
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label{
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 5px;
      color: #333;
      white-space: nowrap;
      text-align: center;
    }

    .digit{
      width: 100%;
      /* 1:1 arány – magasság = szélesség */
      aspect-ratio: 1 / 1;
      text-align: center;
      font-size: 20px;            /* >=16px, hogy iOS ne zoomoljon */
      border: 1px solid #9aa0a6;
      border-radius: 9px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background-color: #fff;
    }
    .digit:focus{
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(0,120,255,0.15);
    }

    button{
      width: 100%;
      font-size: 16px;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      background-color: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover{ background-color: #005fcc; }

    #message{
      margin-top: 12px;
      font-size: 16px;
      font-weight: bold;
      min-height: 1.2em; /* hogy ne ugráljon a layout */
    }
  </style>
</head>
<body>

<img src="Picture2.png" class="logo">

  <div class="box">
    <h2>Add meg a 6 számjegyű kódot!</h2>

    <div class="code-grid" id="codeGrid">
      <div class="cell">
        <div class="label">PCC</div>
        <input id="d1" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">AT</div>
        <input id="d2" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">DRL</div>
        <input id="d3" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">FC</div>
        <input id="d4" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">PWR</div>
        <input id="d5" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">CC</div>
        <input id="d6" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
    </div>

    <button id="checkBtn" type="button">Ellenőrzés</button>
    <div id="message" role="status" aria-live="polite"></div>
  </div>

  <script>
    const correctCode = "545677";

    const inputs = Array.from(document.querySelectorAll(".digit"));
    const msg = document.getElementById("message");
    const checkBtn = document.getElementById("checkBtn");

    // Automatikus fókusz az első mezőre
    window.setTimeout(() => { inputs[0]?.focus(); }, 0);

    function onlyDigit(str){ return (str || "").replace(/\D/g, ""); }

    // Beillesztés támogatás (szétosztja a karaktereket)
    inputs.forEach((inp, idx) => {
      inp.addEventListener("paste", (e) => {
        const text = onlyDigit((e.clipboardData || window.clipboardData).getData("text"));
        if(!text) return;
        e.preventDefault();
        const chars = text.split("").slice(0, inputs.length - idx);
        for(let i = 0; i < chars.length; i++){
          inputs[idx + i].value = chars[i];
        }
        const next = Math.min(idx + chars.length, inputs.length - 1);
        inputs[next].focus();
      });
    });

    // Input és navigáció
    inputs.forEach((inp, idx) => {
      inp.addEventListener("input", () => {
        inp.value = onlyDigit(inp.value).slice(0,1);
        if(inp.value.length === 1 && idx < inputs.length - 1) {
          inputs[idx + 1].focus();
        }
      });

      inp.addEventListener("keydown", (e) => {
        if(e.key === "Backspace" && inp.value === "" && idx > 0){
          inputs[idx - 1].focus();
          inputs[idx - 1].value = "";
          e.preventDefault();
        }
        if(e.key === "ArrowLeft" && idx > 0){
          inputs[idx - 1].focus();
          e.preventDefault();
        }
        if(e.key === "ArrowRight" && idx < inputs.length - 1){
          inputs[idx + 1].focus();
          e.preventDefault();
        }
        if(e.key === "Enter"){ checkCode(); }
      });
    });

    checkBtn.addEventListener("click", checkCode);

    function getCode(){ return inputs.map(i => i.value || "").join(""); }

    function checkCode(){
      const code = getCode();
      if(code.length < inputs.length){
        msg.style.color = "#b00020";
        msg.textContent = "Kérlek töltsd ki mind a 6 mezőt.";
        return;
      }
      if(code === correctCode){
        msg.style.color = "green";
        msg.textContent = "Sikeres belépés! 🎉 Nektek köszönhetően sikeresen elindult az EGIS új SAP S/4HANA rendeszere! A SHERINA program sikerült, gratulálunk! Már csak egy feladat van hátra. Az alábbi üzenetet vidd el a projektmenedzsernek, hogy tudja, hogy elindult az éles rendszer: SHERINYÁLNI, SE FELADNI NEM SZABAD!";
        // Siker esetén átirányíthatod pl.:
        // window.location.href = "success.html";
      }else{
        msg.style.color = "#b00020";
        msg.textContent = "Hibás kód! Próbáld újra.";
      }
    }
  </script>
</body>
</html>
``
