<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kódellenőrzés</title>
  <style>
    :root{
      /* Négyzetek méretezése: min 40px, mobilon rugalmas, desktopon max 56px */
      --cell-size: clamp(40px, 12vw, 56px);
      --gap: 10px;
      --brand: #0078ff;
    }

    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background: url('shutterstock_518160511.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    /* Logó a tetején (ha kell, állíts méretet) */
    .logo{
      margin-top: 28px;
      width: 160px;
      max-width: 65%;
      height: auto;
    }

    .box{
      background: rgba(255,255,255,0.9);
      padding: 20px 16px;
      margin: 28px 14px 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    h2{
      margin: 6px 0 16px;
      font-size: 20px;
    }

    /* Rács: 6 oszlop, kis hézaggal, középre igazítva */
    .code-grid{
      display: grid;
      grid-template-columns: repeat(6, var(--cell-size));
      justify-content: center;
      gap: var(--gap);
      margin: 0 auto 12px;
      width: 100%;
      max-width: calc(6 * var(--cell-size) + 5 * var(--gap));
    }

    /* Egy cella: felül label, alatta a négyzet input */
    .cell{
      display: flex;
      flex-direction: column;
      align-items: center;
      width: var(--cell-size);
    }

    .label{
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 6px;
      color: #333;
      white-space: nowrap;
    }

    .digit{
      width: var(--cell-size);
      height: var(--cell-size);
      text-align: center;
      font-size: clamp(18px, 5vw, 24px);
      border: 1px solid #9aa0a6;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .digit:focus{
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(0,120,255,0.15);
    }

    button{
      width: 100%;
      max-width: 420px;
      font-size: 16px;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      background-color: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover{ background-color: #005fcc; }

    #message{
      margin-top: 14px;
      font-size: 16px;
      font-weight: bold;
    }

    /* Kis képernyőn is biztos férjen: ha nagyon keskeny, csökkentjük a gap-et */
    @media (max-width: 360px){
      :root{ --gap: 8px; }
      .label{ font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- <img class="logo" src="Picture2.png" alt="Céges logó"> -->

  <div class="box">
    <h2>Add meg a 6 számjegyű kódot!</h2>

    <div class="code-grid" id="codeGrid">
      <div class="cell">
        <div class="label">PCC</div>
        <input id="d1" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">AT</div>
        <input id="d2" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">DRL</div>
        <input id="d3" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">FC</div>
        <input id="d4" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">PWR</div>
        <input id="d5" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
      <div class="cell">
        <div class="label">CC</div>
        <input id="d6" class="digit" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
      </div>
    </div>

    <button id="checkBtn" type="button">Ellenőrzés</button>
    <div id="message" role="status" aria-live="polite"></div>
  </div>

  <script>
    const correctCode = "123456"; // <-- Itt állítsd be a helyes kódot

    const inputs = Array.from(document.querySelectorAll(".digit"));
    const msg = document.getElementById("message");
    const checkBtn = document.getElementById("checkBtn");

    // Automatikus fókusz az első mezőre
    inputs[0].focus();

    // Segédfüggvény: csak számot engedünk be
    function onlyDigit(str){
      return (str || "").replace(/\\D/g, "");
    }

    // Beillesztés: ha valaki 6 számot illeszt be, szétszórjuk a mezőkbe
    inputs.forEach((inp, idx) => {
      inp.addEventListener("paste", (e) => {
        const text = onlyDigit((e.clipboardData || window.clipboardData).getData("text"));
        if(!text) return;
        e.preventDefault();
        const chars = text.split("").slice(0, inputs.length - idx);
        // Töltsük az aktuális és a további mezőket
        for(let i = 0; i < chars.length; i++){
          inputs[idx + i].value = chars[i];
        }
        const next = Math.min(idx + chars.length, inputs.length - 1);
        inputs[next].focus();
      });
    });

    // Input: egy karakter után lépjen tovább
    inputs.forEach((inp, idx) => {
      inp.addEventListener("input", () => {
        inp.value = onlyDigit(inp.value).slice(0,1);
        if(inp.value.length === 1 && idx < inputs.length - 1) {
          inputs[idx + 1].focus();
        }
      });

      // Backspace: ha üres és nem az első, lépjünk vissza
      inp.addEventListener("keydown", (e) => {
        if(e.key === "Backspace" && inp.value === "" && idx > 0){
          inputs[idx - 1].focus();
          inputs[idx - 1].value = "";
          e.preventDefault();
        }
        // Bal/Jobb nyíl navigáció
        if(e.key === "ArrowLeft" && idx > 0){
          inputs[idx - 1].focus();
          e.preventDefault();
        }
        if(e.key === "ArrowRight" && idx < inputs.length - 1){
          inputs[idx + 1].focus();
          e.preventDefault();
        }
        // Enter: ellenőrzés
        if(e.key === "Enter"){
          checkCode();
        }
      });
    });

    checkBtn.addEventListener("click", checkCode);

    function getCode(){
      return inputs.map(i => i.value || "").join("");
    }

    function checkCode(){
      const code = getCode();
      if(code.length < inputs.length){
        msg.style.color = "#b00020";
        msg.textContent = "Kérlek töltsd ki mind a 6 mezőt.";
        return;
      }
      if(code === correctCode){
        msg.style.color = "green";
        msg.textContent = "Sikeres belépés! 🎉 Nektek köszönhetően sikeresen elindult az EGIS új SAP S/4HANA rendeszere! A SHERINA program sikerült, gratulálunk! Már csak egy feladat van hátra. Az alábbi üzenetet vidd el a projektmenedzsernek, hogy tudja, hogy elindult az éles rendszer: SHERINYÁLNI SE FELADNI NEM SZABAD!";
        // Itt átirányíthatsz, ha szeretnéd:
        // window.location.href = "success.html";
      }else{
        msg.style.color = "#b00020";
        msg.textContent = "Hibás kód! Próbáld újra.";
        // Opció: ürítsük ki és fókusz vissza az elsőre
        // inputs.forEach(i => i.value = "");
        // inputs[0].focus();
      }
    }
  </script>
</body>
</html>
